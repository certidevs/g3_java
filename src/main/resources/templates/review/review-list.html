<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/head :: head('Review')"></head>
<body>
  <th:block th:replace="layout/navbar :: navbar"></th:block>

  <h1>Vista de Reseñas</h1>

  <div th:if="${message}" class="alert alert-success fade show alert-dismissible" role="alert">
    <i class="fa-solid fa-check-circle"></i>
    <span th:text="${message}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <ul>
    <li th:each="review : ${reviews}">
      <p>⭐ <span th:text="${review.rating}">0</span>/5</p>
      <p th:text="${review.comment}">Comentario de la reseña</p>
      <p>
        🏠 Casa: <span th:text="${review.house != null ? review.house.title : 'Sin casa'}"></span>
      </p>
      <p>
        👤 Usuario: <span>¡Usuario de prueba!</span>
      </p>
    </li>
</body>
</html>
