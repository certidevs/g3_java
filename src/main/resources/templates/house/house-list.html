    <form th:action="@{/houses}" method="get">
        <div class="mb-3">
            <h5>Filtros rápidos</h5>
            <a th:href="@{/houses(reserve='DISPONIBLE')}" class="btn btn-sm btn-secondary">Casas Disponible</a>
            <a th:href="@{/houses(reserve='RESERVADA')}" class="btn btn-sm btn-secondary">Casas Reservadas</a>
            <a th:href="@{/houses}" class="btn btn-sm btn-secondary">Todas</a>
        </div>

        <div class="mb-3 row">
            <div class="col-sm-4 ">
<!--                <label>Precio máximo por noche</label>-->
                <input type="number"
                       th:name="pricePerNight"
                       class="form-control"
                       placeholder="Precio máximo por noche" />
            </div>
<!--            <div class="col-sm-4">-->
<!--&lt;!&ndash;                <label>Búsqueda por título</label>&ndash;&gt;-->
<!--                <input type="text"-->
<!--                       th:name="title"-->
<!--                       class="form-control"-->
<!--                       placeholder="Buscar por título" />-->
<!--            </div>-->
<!--            <div class="col-sm-4">-->
<!--                <input type="text"-->
<!--                       th:name="province"-->
<!--                       class="form-control"-->
<!--                       placeholder="Buscar por Provincia" />-->
<!--            </div>-->
            <div class="col-sm-4">
<!--                <label>Provincia</label>-->
                <select th:name="province" class="form-select  form-control" th:value="${selectedProvince}">
                    <option value="">Todas las provincias</option>
                    <option th:each="p : ${provinces}"
                            th:value="${p}"
                            th:text="${p}" />
                </select>
            </div>
        </div>

        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm">
                <i class="fa-solid fa-magnifying-glass"></i>
                Buscar
            </button>
            <a th:href="@{/houses}" class="btn btn-danger btn-sm">
                <i class="fa-solid fa-broom"></i>
                Limpiar filtros
            </a>
        </div>
<!--        <button type="submit" class="btn btn-primary btn-sm">Aplicar filtros</button>-->
    </form>


    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3 mt-1">
        <div class="col" th:each="house : ${houses}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-store text-primary me-2"></i>
                        <span th:text="${house.title}">Nombre</span>
                    </h5>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <i class="fa-solid fa-euro-sign me-1"></i>
                            <span th:text="${house.pricePerNight}">0</span>
                        </span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <a th:href="@{/houses/{id}(id=${house.id})}"
                       class="btn btn-outline-primary btn-sm w-50">
                        <i class="fa-regular fa-eye me-1"></i> Ver Casa
                    </a>
<!--                    boton de desactivar casa-->
                    <a th:href="@{/houses/disable/{id}(id=${house.id})}"
                       class="btn btn-danger btn-sm w-50 mt-2">
                        <i class="fa-regular fa-ban me-1"></i> Ocultar Casa
                    </a>
                </div>
            </div>
        </div>
    </div>

<!--    <div class="mt-4">-->
