<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ROADS</title>
</head>

<body>

<!-- HERO -->
<div class="hero">

    <h1>🌍 Descubre tu próxima escapada</h1>
    <p>Casas únicas para experiencias inolvidables</p>

    <a class="btn" href="/houses">Explorar casas</a>

</div>

<!-- CASAS -->
<div class="section">

    <h2>🏡 Casas destacadas</h2>

    <div class="grid">

        <div class="card" th:each="house : ${houses}">

            <h3 th:text="${house.title}"></h3>

            <p>📍 <span th:text="${house.location}"></span></p>

            <p th:text="${house.description}"></p>

            <div class="price">
                💰 <span th:text="${house.pricePerNight}"></span> €/noche
            </div>

            <!-- botón dinámico -->
            <a th:href="@{'/houses/' + ${house.id}}" class="btn-small">
                Ver detalle
            </a>

        </div>

    </div>

</div>
